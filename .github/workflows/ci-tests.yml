# added by policies_guard_common_fixes
permissions:
  contents: read
name: CI tests
on:
  pull_request:
  push:
    branches: [ main ]
concurrency:
  group: .github/workflows/ci-tests.yml-${{ github.ref }}
  cancel-in-progress: true
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip -c constraints/security-pins.txt
          python -m pip cache purge || true
          python -m pip install --no-cache-dir -r requirements.lock -c constraints/security-pins.txt
          python -m pip install --no-cache-dir pre-commit -c constraints/security-pins.txt
          python -m pip install -e . --no-deps
      - name: Run pre-commit on repo
        continue-on-error: true
        run: pre-commit run --all-files
      - name: Prepare reproducible manuscript artifacts for tests
        run: |
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          python scripts/stability_audit_ch01_ch03.py
          python scripts/03_stability_domain/03_fig_05_self_healing.py
          python scripts/phase4_global_verdict.py
          python scripts/phase4_zenodo_package.py
          python scripts/phase5_geometric_solution.py
          python scripts/manuscript_artifact_manifest.py
      - name: Run stability audit regression gate
        run: |
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          pytest -q tests/test_stability_audit_regression.py tests/test_canonical_asset_paths.py tests/test_phase4_zenodo_package.py tests/test_phase5_geometric_solution.py
      - name: Run Table/Data consistency gate
        run: |
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          python scripts/verify_table_consistency.py
      - name: Run pytest
        run: |
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          pytest -q

      - name: Regenerate Phase 2 observational log
        run: |
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          python scripts/04_expansion_supernovae/generate_data_chapter04_pantheon.py
          python scripts/05_primordial_bbn/generate_data_chapter05.py
          python scripts/05_primordial_bbn/validate_bbn_convergence.py
          python scripts/05_primordial_bbn/05_fig_05_bbn_3min_summary.py
          python scripts/phase2_observational_report.py

      - name: Regenerate Phase 3 LSS and geometry report
        run: |
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          python scripts/phase3_lss_geometry_report.py

      - name: Regenerate Phase 4 global verdict package
        run: |
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          python scripts/phase4_global_verdict.py
          python scripts/phase4_zenodo_package.py
          python scripts/phase5_geometric_solution.py
          python scripts/manuscript_artifact_manifest.py
