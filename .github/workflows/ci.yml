# added by policies_guard_common_fixes
permissions:
  contents: read
name: ci
on:
  push:
  pull_request:

concurrency:
  group: .github/workflows/ci.yml-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      MCGT_USE_TEX: "0"
      MPLBACKEND: Agg
      MPLCONFIGDIR: .repro-mplconfig
      XDG_CACHE_HOME: .repro-mplconfig
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip -c constraints/security-pins.txt
          python -m pip cache purge || true
          python -m pip install --no-cache-dir -r requirements.lock -c constraints/security-pins.txt
          python -m pip install --no-cache-dir pre-commit -c constraints/security-pins.txt
          python -m pip install -e . --no-deps

      - name: Run pre-commit (all files)
        continue-on-error: true
        run: pre-commit run -a

      - name: Prepare reproducible manuscript artifacts for tests
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          python scripts/stability_audit_ch01_ch03.py
          python scripts/03_stability_domain/03_fig_05_self_healing.py
          python scripts/phase4_global_verdict.py
          python scripts/phase4_zenodo_package.py
          python scripts/phase5_geometric_solution.py
          python scripts/manuscript_artifact_manifest.py

      - name: Run stability audit regression gate
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          pytest -q tests/test_stability_audit_regression.py tests/test_canonical_asset_paths.py tests/test_phase4_zenodo_package.py tests/test_phase5_geometric_solution.py

      - name: Run Table/Data consistency gate
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          python scripts/verify_table_consistency.py

      - name: Run cold-run reproducibility gate
        run: |
          set -euo pipefail
          bash check_reproducibility.sh

      - name: Run pytest (si des tests existent)
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          if ls tests 2>/dev/null 1>/dev/null || ls scripts/**/tests 2>/dev/null 1>/dev/null; then
            pytest -q
          else
            echo "Aucun repertoire de tests detecte  etape ignoree."
          fi

      - name: Regenerate Phase 2 manuscript artifacts
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          python scripts/04_expansion_supernovae/generate_data_chapter04_pantheon.py
          python scripts/05_primordial_bbn/generate_data_chapter05.py
          python scripts/05_primordial_bbn/validate_bbn_convergence.py
          python scripts/05_primordial_bbn/05_fig_05_bbn_3min_summary.py
          python scripts/04_expansion_supernovae/04_fig_06_pantheon_residuals.py
          python scripts/phase2_observational_report.py

      - name: Upload Phase 2 manuscript artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase2-observational-artifacts
          path: |
            assets/zz-figures/04_expansion_supernovae/04_fig_06_pantheon_residuals.png
            assets/zz-figures/04_expansion_supernovae/04_fig_06_pantheon_residuals.pdf
            assets/zz-figures/04_expansion_supernovae/04_fig_06_pantheon_residuals.svg
            assets/zz-figures/05_primordial_bbn/05_fig_05_bbn_3min_summary.png
            assets/zz-figures/05_primordial_bbn/05_fig_05_bbn_3min_summary.pdf
            assets/zz-figures/03_stability_domain/03_fig_05_self_healing.png
            assets/zz-data/04_expansion_supernovae/04_pantheon_summary.json
            assets/zz-data/05_primordial_bbn/05_bbn_convergence_summary.json
            phase2_observational_log.txt

      - name: Regenerate Phase 3 LSS and geometry artifacts
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          python scripts/phase3_lss_geometry_report.py

      - name: Upload Phase 3 manuscript artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase3-lss-geometry-artifacts
          path: |
            assets/zz-data/06_early_growth_jwst/06_jwst_growth_boost.csv
            assets/zz-data/07_bao_geometry/07_bao_hubble_pivot.csv
            assets/zz-data/08_sound_horizon/08_sound_horizon_near_decoupling.csv
            assets/zz-figures/06_early_growth_jwst/06_fig_09_structure_growth_factor.png
            assets/zz-figures/07_bao_geometry/07_fig_10_bao_hubble_diagram.png
            assets/zz-figures/08_sound_horizon/08_fig_11_sound_horizon_near_decoupling.png
            phase3_lss_geometry_report.txt
            phase3_lss_geometry_report.json

      - name: Regenerate Phase 4 global verdict artifacts
        run: |
          set -euo pipefail
          export PYTHONPATH="${PYTHONPATH:-}:$(pwd)"
          python scripts/phase4_global_verdict.py
          python scripts/phase4_zenodo_package.py
          python scripts/phase5_geometric_solution.py
          python scripts/manuscript_artifact_manifest.py

      - name: Upload Phase 4 global verdict artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase4-global-verdict-artifacts
          path: |
            assets/zz-data/10_global_scan/10_mcmc_affine_chain.csv.gz
            assets/zz-data/10_global_scan/10_mcmc_global_summary.json
            assets/zz-data/10_global_scan/10_table_02_marginalized_constraints.csv
            assets/zz-data/10_global_scan/10_table_02_marginalized_constraints.md
            assets/zz-figures/09_dark_energy_cpl/09_fig_12_equation_of_state_evolution.png
            assets/zz-figures/09_dark_energy_cpl/09_fig_13_cpl_constraints_contours.png
            assets/zz-figures/10_global_scan/10_fig_17_5d_corner_plot.png
            assets/zz-data/11_lss_s8_tension/11_scale_conflict_summary.csv
            assets/zz-data/11_lss_s8_tension/11_scale_conflict_summary.json
            assets/zz-data/12_cmb_verdict/12_step_transition_law.csv
            assets/zz-data/12_cmb_verdict/12_step_transition_summary.json
            assets/zz-figures/11_lss_s8_tension/11_fig_19_screening_failures.png
            assets/zz-figures/12_cmb_verdict/12_fig_21_perfect_k_transition_law.png
            phase4_global_verdict_report.json
            final_synthesis_v4.0.0_GOLD.json
            assets/zz-manifests/manuscript_artifact_manifest.json
            assets/zz-manifests/manuscript_artifact_manifest.md
            zz-zenodo/phase4_global_verdict_v4.0.0
            zz-zenodo/phase4_global_verdict_v4.0.0.tar.gz
