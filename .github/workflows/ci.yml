# added by policies_guard_common_fixes
permissions:
  contents: read

name: ci

on:
  push:
  pull_request:

concurrency:
  group: .github/workflows/ci.yml-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      MCGT_USE_TEX: "0"
      MPLBACKEND: Agg
      MPLCONFIGDIR: .repro-mplconfig
      XDG_CACHE_HOME: .repro-mplconfig
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install locked dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip -c constraints/security-pins.txt
          python -m pip cache purge || true
          python -m pip install --no-cache-dir -r requirements.lock -c constraints/security-pins.txt
          python -m pip install --no-cache-dir pre-commit -c constraints/security-pins.txt
          python -m pip install -e . --no-deps

      - name: Run pre-commit (all files)
        continue-on-error: true
        run: pre-commit run -a

      - name: Quick consistency gate
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          python scripts/verify_table_consistency.py

      - name: Run pytest
        run: |
          set -euo pipefail
          export PYTHONPATH="$(pwd)/src:$(pwd):${PYTHONPATH:-}"
          pytest -q
