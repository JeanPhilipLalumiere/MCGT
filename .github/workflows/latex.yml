name: build-pdf

on: [push, pull_request]

jobs:
  latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: main.tex
          latexmk_shell_escape: true
      - name: Upload compiled PDF          
          uses: actions/upload-artifact@v4
          with:
            name: main.pdf                   
            path: main.pdf                   
